<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Disconnected</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 38%),
          linear-gradient(180deg, #08101d 0%, #030712 100%);
        color: #e2e8f0;
      }

      main {
        width: min(46rem, calc(100vw - 5rem));
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 2rem;
        background: rgba(2, 6, 23, 0.72);
        box-shadow: 0 32px 120px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(18px);
        padding: 3rem 3.25rem;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: rgba(125, 211, 252, 0.72);
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(2.8rem, 5vw, 4.8rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 1rem 0 0;
        font-size: clamp(1rem, 1.8vw, 1.25rem);
        line-height: 1.8;
        color: rgba(226, 232, 240, 0.84);
      }

      .hint {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 2rem;
        padding: 0.8rem 1.1rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.62);
        font-size: 0.82rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.76);
      }

      .key {
        display: inline-grid;
        place-items: center;
        min-width: 3.2rem;
        min-height: 2rem;
        padding: 0 0.6rem;
        border-radius: 0.8rem;
        border: 1px solid rgba(125, 211, 252, 0.32);
        background: rgba(56, 189, 248, 0.12);
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Agent Kiosk</p>
      <h1>Disconnected</h1>
      <p>The active session has been closed. Press Command-R to load the target app and start a fresh session.</p>
      <div class="hint">
        <span class="key">Cmd+R</span>
        Restart session
      </div>
    </main>
  </body>
</html>
