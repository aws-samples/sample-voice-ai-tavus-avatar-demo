AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infrastructure for tavus-pipecat-example: ECS Fargate backend + S3/CloudFront frontend.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (use your default VPC)
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for ALB and ECS tasks (at least 2 in different AZs)
  EnvironmentName:
    Type: String
    Default: tavus-pipecat
  ContainerPort:
    Type: Number
    Default: 7860
  TaskCpu:
    Type: String
    Default: '4096'
  TaskMemory:
    Type: String
    Default: '8192'
  CertificateArn:
    Type: String
    Description: ARN of an ACM certificate (same region as ALB) to enable HTTPS. Leave empty to keep HTTP-only.
    Default: ''
  EventConfig:
    Type: String
    Default: 'aws-summit-bengaluru-2026'
    Description: Event directory under prompts/ (e.g. aws-summit-bengaluru-2026)

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # ---- ECR ----
  ECRRepository:
    Type: AWS::ECR::Repository
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit repository name used for consistent ECR push/pull scripts; name is environment-scoped and collision is not a concern"
    Properties:
      RepositoryName: !Sub '${EnvironmentName}-backend'
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"selection":{"tagStatus":"untagged","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}

  # ---- IAM ----
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit role name used for auditability and cross-stack reference; name is environment+region-scoped"
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-IAM4
            reason: "AmazonECSTaskExecutionRolePolicy is the standard managed policy for ECS task execution; scoping it further would require manually duplicating its permissions"
    Properties:
      RoleName: !Sub '${EnvironmentName}-${AWS::Region}-task-exec'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SSMReadSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/*'

  TaskRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit role name used for auditability and cross-stack reference; name is environment+region-scoped"
          - id: W11
            reason: "Bedrock foundation model ARNs do not support resource-level conditions; wildcard is required by the service"
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-IAM5
            reason: "Bedrock InvokeModel requires Resource: * — foundation model ARNs do not support resource-level IAM conditions"
    Properties:
      RoleName: !Sub '${EnvironmentName}-${AWS::Region}-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'

  # ---- Security Groups ----
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W9
            reason: "ALB must accept traffic from the public internet; /0 is intentional for a public-facing load balancer"
          - id: W2
            reason: "ALB must accept traffic from the public internet; /0 is intentional for a public-facing load balancer"
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-EC23
            reason: "Public-facing ALB requires 0.0.0.0/0 inbound on 80/443; restricting source IPs would break public demo access"
    Properties:
      GroupDescription: ALB - allow HTTP/HTTPS inbound
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP inbound for redirect to HTTPS
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS inbound

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W5
            reason: "ECS tasks require outbound HTTPS to reach AWS APIs and third-party services (Deepgram, Cartesia, Tavus, Daily); /0 egress is intentional"
          - id: W9
            reason: "WebRTC media requires inbound UDP from the public internet across a wide port range; narrowing would break real-time audio/video"
          - id: W2
            reason: "WebRTC media requires inbound UDP from the public internet; /0 is intentional for peer-to-peer media"
          - id: W27
            reason: "WebRTC requires a broad UDP port range (10000-65535) for media transport; this is the standard SRTP/ICE port range"
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-EC23
            reason: "WebRTC media transport requires inbound UDP 10000-65535 from 0.0.0.0/0; this is the standard SRTP/ICE port range for peer-to-peer real-time media"
    Properties:
      GroupDescription: ECS tasks - allow traffic from ALB and WebRTC UDP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 10000
          ToPort: 65535
          CidrIp: 0.0.0.0/0
          Description: WebRTC media (UDP)
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (SSM, ECR, WebRTC UDP, third-party APIs)

  # Standalone rules to break the circular dependency between ALBSecurityGroup and ECSSecurityGroup
  ALBToECSEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      DestinationSecurityGroupId: !Ref ECSSecurityGroup
      Description: Forward traffic to ECS tasks

  ECSFromALBIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ECSSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: App port from ALB

  # ---- ALB ----
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit ALB name used for consistent DNS lookup in deployment scripts; name is environment-scoped"
          - id: W52
            reason: "ALB access logging omitted for this demo; CloudFront access logs cover the request path; adding a log bucket adds cost disproportionate to the use case"
    Properties:
      Name: !Sub '${EnvironmentName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-tg'
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /start
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Matcher:
        HttpCode: '200-499'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W56
            reason: "HTTP listener exists solely to redirect to HTTPS when a certificate is provided; when no cert is present this is an accepted trade-off for the demo environment"
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref ALBTargetGroup

  ALBHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W55
            reason: "HTTPS listener uses ACM certificate with TLSv1.2_2021 minimum; SSLPolicy is managed by CloudFront which enforces modern TLS upstream"
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ---- ECS ----
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${EnvironmentName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W84
            reason: "CloudWatch log group uses AWS-managed encryption by default; KMS CMK would add key management cost and complexity disproportionate to this demo"
    Properties:
      LogGroupName: !Sub '/ecs/${EnvironmentName}'
      RetentionInDays: 14

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Metadata:
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-ECS2
            reason: "Non-sensitive configuration values (AWS region, Bedrock model ID) are passed as plain env vars; all secrets (API keys) are injected from SSM Parameter Store"
    Properties:
      Family: !Sub '${EnvironmentName}-task'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: pipecat-bot
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:latest'
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: pipecat
          Secrets:
            - Name: DEEPGRAM_API_KEY
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DEEPGRAM_API_KEY'
            - Name: CARTESIA_API_KEY
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/CARTESIA_API_KEY'
            - Name: TAVUS_API_KEY
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/TAVUS_API_KEY'
            - Name: TAVUS_REPLICA_ID
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/TAVUS_REPLICA_ID'
            - Name: TAVUS_REPLICA_ID_NOVA_SONIC
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/TAVUS_REPLICA_ID_NOVA_SONIC'
            - Name: DAILY_API_KEY
              ValueFrom: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DAILY_API_KEY'
          Environment:
            - Name: AWS_REGION_NOVA_SONIC
              Value: ap-northeast-1
            - Name: BEDROCK_REGION
              Value: ap-south-1
            - Name: BEDROCK_MODEL_ID
              Value: apac.anthropic.claude-haiku-4-5-20251001-v1:0
            - Name: EVENT_CONFIG
              Value: !Ref EventConfig

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub '${EnvironmentName}-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Ref PublicSubnetIds
      LoadBalancers:
        - ContainerName: pipecat-bot
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ALBTargetGroup

  # ---- Auto Scaling ----
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSCluster}/${ECSService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${EnvironmentName}-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 120
        ScaleOutCooldown: 60

  # ---- S3 Frontend Bucket ----
  FrontendBucket:
    Type: AWS::S3::Bucket
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: "S3 access logging omitted for this demo; CloudFront access logs cover the request path; adding a separate log bucket adds cost disproportionate to the use case"
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-S1
            reason: "CloudFront standard logging to LogBucket covers all request-path access; S3 server access logs would be redundant for this use case"
    Properties:
      BucketName: !Sub '${EnvironmentName}-frontend-${AWS::Region}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub '${FrontendBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  # ---- CloudFront ----
  # Viewer-request function: rewrite /content/foo → /content/foo/index.html
  # so S3 serves the correct file instead of returning 403 (which triggers
  # the SPA fallback and breaks iframe content overlays).
  ContentRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${EnvironmentName}-${AWS::Region}-content-rewrite'
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          // If the URI ends without a file extension and without a trailing slash,
          // append /index.html so S3 resolves the directory index.
          if (uri.startsWith('/content/') && !uri.endsWith('/') && uri.lastIndexOf('.') <= uri.lastIndexOf('/')) {
            request.uri = uri + '/index.html';
          }
          return request;
        }
      FunctionConfig:
        Comment: 'Rewrite /content/* directory paths to /index.html for S3'
        Runtime: cloudfront-js-2.0

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${EnvironmentName}-${AWS::Region}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Metadata:
      cdk-nag:
        rules_to_suppress:
          - id: AwsSolutions-CFR1
            reason: "Geo restrictions not required for a public demo; content is intentionally globally accessible"
          - id: AwsSolutions-CFR2
            reason: "WAF not warranted for a kiosk demo with no user data or financial transactions; cost disproportionate to risk"
          - id: AwsSolutions-CFR4
            reason: "When no ACM certificate is provided the CloudFront default certificate is used and TLS version cannot be customised; when a cert is provided TLSv1.2_2021 is enforced via MinimumProtocolVersion"
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub '${EnvironmentName} frontend + API proxy'
        ViewerCertificate: !If
          - HasCertificate
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ALBOrigin
            DomainName: !GetAtt ALB.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: !If [HasCertificate, 'https-only', 'http-only']
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: '/content/*'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            Compress: true
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ContentRewriteFunction.FunctionARN
          - PathPattern: '/api/*'
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
          - PathPattern: '/start'
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
  FrontendBucketName:
    Value: !Ref FrontendBucket
  ECSClusterName:
    Value: !Ref ECSCluster
  ECSServiceName:
    Value: !GetAtt ECSService.Name
