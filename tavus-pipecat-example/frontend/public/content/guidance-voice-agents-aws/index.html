<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Guidance for Voice Agents on AWS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:radial-gradient(circle at top,rgba(14,165,233,0.14),transparent 34%),linear-gradient(180deg,#06101b 0%,#02060d 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .wrap{max-width:72rem;width:100%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:2rem}
  @media(max-width:768px){.wrap{grid-template-columns:1fr}}
  figure{display:flex;flex-direction:column;gap:.75rem}
  .img-frame{overflow:hidden;border-radius:1.75rem;border:1px solid rgba(255,255,255,0.1);background:rgba(15,23,42,0.8);box-shadow:0 30px 120px rgba(0,0,0,0.35)}
  .img-frame img{width:100%;height:auto;display:block}
  figcaption{text-align:center;font-size:.75rem;text-transform:uppercase;letter-spacing:.28em;color:rgba(203,213,225,0.8)}
  .cta{display:flex;flex-direction:column;align-items:center;gap:1.5rem;min-width:200px}
  .btn{display:inline-flex;align-items:center;gap:.625rem;border-radius:9999px;border:1px solid rgba(110,231,183,0.3);background:rgba(52,211,153,0.12);padding:.875rem 1.75rem;font-size:1rem;font-weight:600;color:rgba(209,250,229,0.9);text-decoration:none;transition:background .2s}
  .btn:hover{background:rgba(52,211,153,0.2)}
  .btn svg{width:1.25rem;height:1.25rem;fill:currentColor}
  .qr-block{display:flex;flex-direction:column;align-items:center;gap:.625rem}
  .qr-block img{width:9rem;height:9rem;border-radius:.75rem;background:#fff;padding:.375rem}
  .qr-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.22em;color:rgba(203,213,225,0.6);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <figure>
    <div class="img-frame">
      <img alt="Guidance for voice agents on AWS" src="/content/guidance-voice-agents-aws.png" />
    </div>
    <figcaption>Guidance for Voice Agents on AWS</figcaption>
  </figure>
  <div class="cta">
    <a class="btn" href="https://github.com/aws-samples/sample-voice-ai-tavus-avatar-demo" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      Star this repo
    </a>
    <div class="qr-block">
      <img src="/qr-code.png" alt="QR code" />
      <span class="qr-label">Scan to connect with the<br>AWS Voice AI team</span>
    </div>
  </div>
</div>
</body>
</html>
