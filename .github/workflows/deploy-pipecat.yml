name: Deploy tavus-pipecat-example

on:
  push:
    branches: [main]
    paths:
      - 'tavus-pipecat-example/**'
      - 'prompts/**'
      - '.github/workflows/deploy-pipecat.yml'
  workflow_dispatch:

env:
  # Set AWS_REGION and EVENT_CONFIG as GitHub repository variables (Settings > Variables)
  # so each fork/deployment can target a different region and event without changing code.
  # wirjo/voice-ai-demo:              AWS_REGION=ap-southeast-2, EVENT_CONFIG=aws-summit-sydney-2026
  # aws-samples/...-demo:             AWS_REGION=ap-south-1,     EVENT_CONFIG=aws-summit-bengaluru-2026
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  EVENT_CONFIG: ${{ vars.EVENT_CONFIG || 'aws-summit-bengaluru-2026' }}
  ECR_REPOSITORY: tavus-pipecat-backend
  ECS_CLUSTER: tavus-pipecat-cluster
  ECS_SERVICE: tavus-pipecat-service
  CFN_STACK_NAME: tavus-pipecat

jobs:
  deploy-infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file tavus-pipecat-example/infra/template.yaml \
            --stack-name $CFN_STACK_NAME \
            --parameter-overrides \
              VpcId=${{ secrets.CFN_VPC_ID }} \
              PublicSubnetIds=${{ secrets.CFN_SUBNET_IDS }} \
              CertificateArn=${{ secrets.CFN_CERTIFICATE_ARN || '' }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

  deploy-backend:
    name: Build & deploy backend
    needs: deploy-infra
    name: Build & deploy backend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: tavus-pipecat-example/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

  deploy-frontend:
    name: Build & deploy frontend
    needs: deploy-infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tavus-pipecat-example/frontend/package-lock.json

      - name: Install and build
        working-directory: tavus-pipecat-example/frontend
        env:
          REACT_APP_API_URL: ''
          REACT_APP_TRANSPORT: daily
          REACT_APP_EVENT_CONFIG: ${{ env.EVENT_CONFIG }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync \
            tavus-pipecat-example/frontend/build/ \
            s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
